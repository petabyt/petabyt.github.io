<!DOCTYPE html>
<html>
<head>
	<title>{{ .Site.Title }}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="UTF-8">
	<link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
	<style>
		body, html {
			font-family: serif;
			color: white;
			background-color: #161616;
			font-size: large;
		}
		a {color: lightblue;}
		a:visited {color: #719aa6;}
		.post {
			background-color: #0e0e0e;
			max-width: 900px;
			margin: auto;
			margin-bottom: 20px;
			padding: 10px;
		}
		.post h1 { margin: 0px; }
		.header {
			text-align: center;
			margin-bottom: 10px;
		}
		.center {
		    text-align: center;
		}
		.header h1 {
			margin-bottom: 0px;
		}
		code {
			display: inline-block;
			background: #0b140b;
			margin: 2px;
			padding: 2px;
			white-space: break-spaces;
		}
		.back {
			display: block;
			width: 50px;
			margin: auto;
		}
		img {
			max-height: 500px;
			max-width: 100%;
			vertical-align: top;
		}
	</style>
</head>
<body>
	<div class="header">
		<a href="{{ "blog/" | relURL }}"><h1>Daniel Cook</h1></a>
		<a href="{{ "rss.xml" | relURL }}">RSS</a><br>
	</div>
	<div class="post">
		<h1>{{ .Title }}</h1>
		<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
		<hr>
		<p>{{ .Content }}</p>
	</div>
</body>
</html>
